services:
  - type: web
    name: alfahou
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALFAHOU_LLM_PROVIDER
        value: hf
      - key: ALFAHOU_LLM_MODEL
        value: meta-llama/Llama-3.1-8B-Instruct
      - key: ALFAHOU_LLM_BASE_URL
        value: https://router.huggingface.co/v1
      - key: ALFAHOU_LLM_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
