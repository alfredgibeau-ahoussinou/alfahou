<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AlfAhou — Alfred Ahoussinou</title>
  <meta name="description" content="AlfAhou : conversation multimédia FR/EN — texte, image, vidéo, PDF." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>

  <div class="shell">
    <header class="top">
      <div class="brand-block">
        <h1 class="brand">AlfAhou</h1>
        <p class="owner">Alfred Ahoussinou</p>
      </div>
      <a class="gh" href="https://github.com/alfredgibeau-ahoussinou/alfahou" target="_blank" rel="noopener">GitHub</a>
    </header>

    <main class="chat" id="chat">
      <div class="thread" id="thread" aria-live="polite">
        <article class="bubble bot welcome" id="welcome">
          <p class="who">AlfAhou</p>
          <p>Salut — écris-moi un message en français ou en anglais. Je peux répondre, créer une image, une vidéo ou un PDF.</p>
        </article>
      </div>

      <form id="composer" class="composer" autocomplete="off">
        <div class="modes" role="group" aria-label="Type de réponse">
          <label class="mode"><input type="radio" name="modality" value="auto" checked /><span>Auto</span></label>
          <label class="mode"><input type="radio" name="modality" value="text" /><span>Texte</span></label>
          <label class="mode"><input type="radio" name="modality" value="image" /><span>Image</span></label>
          <label class="mode"><input type="radio" name="modality" value="video" /><span>Vidéo</span></label>
          <label class="mode"><input type="radio" name="modality" value="pdf" /><span>PDF</span></label>
        </div>
        <div class="row">
          <label class="sr-only" for="prompt">Message</label>
          <textarea id="prompt" name="prompt" rows="1" placeholder="Écris ton message…" required></textarea>
          <button type="submit" id="go" aria-label="Envoyer">Envoyer</button>
        </div>
        <p id="status" class="status" hidden></p>
      </form>
    </main>

    <footer class="foot">
      <span id="device">—</span>
      <span>FR · EN</span>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
