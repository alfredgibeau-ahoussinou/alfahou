<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AlfAhou</title>
  <meta name="description" content="AlfAhou — IA multimédia d’Alfred Ahoussinou" />
  <meta name="theme-color" content="#F7F6F3" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <a class="skip" href="#prompt">Aller à la saisie</a>

  <div class="canvas" aria-hidden="true">
    <div class="wash"></div>
    <div class="mesh"></div>
    <div class="noise"></div>
  </div>

  <div class="app" id="app">
    <header class="bar">
      <a class="logo" href="/" aria-label="AlfAhou accueil">AlfAhou</a>
      <div class="bar-meta">
        <p class="live" id="device" aria-live="polite">connexion…</p>
        <div class="bar-actions">
          <button type="button" id="btn-voice-out" class="text-btn" title="Lecture vocale">Voix</button>
          <button type="button" id="btn-reset" class="text-btn">Nouveau</button>
          <a class="text-btn" href="https://github.com/alfredgibeau-ahoussinou/alfahou" target="_blank" rel="noopener">Code</a>
        </div>
      </div>
    </header>

    <main class="stage">
      <section class="hero" aria-labelledby="brand">
        <p class="eyebrow">Alfred Ahoussinou</p>
        <h1 id="brand" class="brand">AlfAhou</h1>
        <p class="lede">Crée et discute — texte, image, vidéo, PDF. FR &amp; EN.</p>
      </section>

      <section class="work" aria-label="Conversation">
        <div class="controls">
          <label class="select">
            <span class="label">Mode</span>
            <select id="mode">
              <option value="balanced">Équilibré</option>
              <option value="creative">Créatif</option>
              <option value="precise">Précis</option>
              <option value="teacher">Prof</option>
            </select>
          </label>
          <div class="seg" role="radiogroup" aria-label="Modalité">
            <label class="seg-item"><input type="radio" name="modality" value="auto" form="composer" checked /><span>Auto</span></label>
            <label class="seg-item"><input type="radio" name="modality" value="text" form="composer" /><span>Texte</span></label>
            <label class="seg-item"><input type="radio" name="modality" value="image" form="composer" /><span>Image</span></label>
            <label class="seg-item"><input type="radio" name="modality" value="video" form="composer" /><span>Vidéo</span></label>
            <label class="seg-item"><input type="radio" name="modality" value="pdf" form="composer" /><span>PDF</span></label>
          </div>
        </div>

        <div class="thread" id="thread" aria-live="polite">
          <article class="turn bot welcome">
            <header class="turn-head">
              <span class="who">AlfAhou</span>
              <time class="when">maintenant</time>
            </header>
            <div class="turn-body md">
              <p>Bonjour. Dis ce que tu veux créer ou comprendre — je réponds directement.</p>
            </div>
          </article>
        </div>

        <div id="suggestions" class="chips" hidden></div>

        <form id="composer" class="composer" autocomplete="off">
          <button type="button" id="btn-mic" class="icon-btn" title="Dicter" aria-label="Dicter">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <label class="sr-only" for="prompt">Message</label>
          <textarea id="prompt" name="prompt" rows="1" placeholder="Écrire un message…" required></textarea>
          <button type="submit" id="go" class="send" aria-label="Envoyer">
            <span>Envoyer</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>
        <p id="status" class="status" role="status" hidden></p>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
