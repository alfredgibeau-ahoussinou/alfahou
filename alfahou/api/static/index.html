<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AlfAhou — Alfred Ahoussinou</title>
  <meta name="description" content="AlfAhou — IA multimédia FR/EN d’Alfred Ahoussinou" />
  <meta name="theme-color" content="#0C0F14" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="stage">
    <aside class="brand-rail" aria-label="AlfAhou">
      <p class="eyebrow">Alfred Ahoussinou</p>
      <h1 class="brand">AlfAhou</h1>
      <p class="manifesto">Correspondance multimédia. Texte, image, vidéo, PDF — FR & EN.</p>
      <div class="rail-actions">
        <button type="button" id="btn-reset" class="ghost-btn">Nouvelle conversation</button>
        <a class="ghost-btn link" href="https://github.com/alfredgibeau-ahoussinou/alfahou" target="_blank" rel="noopener">GitHub</a>
      </div>
      <p class="rail-foot" id="device">—</p>
    </aside>

    <section class="converse">
      <header class="mobile-bar">
        <div>
          <p class="eyebrow">Alfred Ahoussinou</p>
          <h1 class="brand-sm">AlfAhou</h1>
        </div>
        <button type="button" id="btn-reset-m" class="icon-round" aria-label="Nouvelle conversation">↻</button>
      </header>

      <div class="controls">
        <label class="field">
          <span>Mode</span>
          <select id="mode">
            <option value="balanced">Équilibré</option>
            <option value="creative">Créatif</option>
            <option value="precise">Précis</option>
            <option value="teacher">Prof</option>
          </select>
        </label>
        <div class="modes" role="group" aria-label="Modalité">
          <label class="chip"><input type="radio" name="modality" value="auto" checked /><span>Auto</span></label>
          <label class="chip"><input type="radio" name="modality" value="text" /><span>Texte</span></label>
          <label class="chip"><input type="radio" name="modality" value="image" /><span>Image</span></label>
          <label class="chip"><input type="radio" name="modality" value="video" /><span>Vidéo</span></label>
          <label class="chip"><input type="radio" name="modality" value="pdf" /><span>PDF</span></label>
        </div>
        <button type="button" id="btn-voice-out" class="icon-round" title="Lecture vocale">♪</button>
      </div>

      <div class="thread" id="thread" aria-live="polite">
        <article class="msg bot">
          <p class="msg-label">AlfAhou</p>
          <div class="md">
            <p>Salut. Dis-moi ce que tu veux créer ou comprendre — en français ou en anglais.</p>
          </div>
        </article>
      </div>

      <div id="suggestions" class="suggestions" hidden></div>

      <form id="composer" class="composer" autocomplete="off">
        <button type="button" id="btn-mic" class="icon-round" title="Dicter" aria-label="Dicter">🎙</button>
        <label class="sr-only" for="prompt">Message</label>
        <textarea id="prompt" name="prompt" rows="1" placeholder="Écrire à AlfAhou…" required></textarea>
        <button type="submit" id="go">Envoyer</button>
      </form>
      <p id="status" class="status" hidden></p>
    </section>
  </div>
  <script src="/app.js"></script>
</body>
</html>
