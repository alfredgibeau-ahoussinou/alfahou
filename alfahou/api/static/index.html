<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AlfAhou</title>
  <meta name="description" content="AlfAhou — conversation multimédia FR/EN" />
  <meta name="theme-color" content="#F2F2F7" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="phone">
    <header class="im-header">
      <button type="button" id="btn-reset" class="nav-btn" aria-label="Nouvelle conversation">‹</button>
      <div class="contact">
        <div class="avatar" aria-hidden="true">A</div>
        <div class="contact-meta">
          <h1>AlfAhou</h1>
          <p>Alfred Ahoussinou</p>
        </div>
      </div>
      <button type="button" id="btn-voice-out" class="nav-btn text" title="Lire à voix haute">♪</button>
    </header>

    <div class="im-toolbar">
      <select id="mode" aria-label="Mode">
        <option value="balanced">Équilibré</option>
        <option value="creative">Créatif</option>
        <option value="precise">Précis</option>
        <option value="teacher">Prof</option>
      </select>
      <div class="modes" role="group" aria-label="Modalité">
        <label class="mode"><input type="radio" name="modality" value="auto" checked /><span>Auto</span></label>
        <label class="mode"><input type="radio" name="modality" value="text" /><span>Texte</span></label>
        <label class="mode"><input type="radio" name="modality" value="image" /><span>Image</span></label>
        <label class="mode"><input type="radio" name="modality" value="video" /><span>Vidéo</span></label>
        <label class="mode"><input type="radio" name="modality" value="pdf" /><span>PDF</span></label>
      </div>
    </div>

    <main class="thread" id="thread" aria-live="polite">
      <p class="day-stamp">Aujourd’hui</p>
      <article class="bubble bot">
        <div class="md">
          <p>Salut 👋 Je suis AlfAhou. Écris-moi en français ou en anglais — texte, image, vidéo, PDF…</p>
        </div>
      </article>
    </main>

    <div id="suggestions" class="suggestions" hidden></div>

    <form id="composer" class="composer" autocomplete="off">
      <button type="button" id="btn-mic" class="fab" title="Dicter" aria-label="Dicter">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.9V21h2v-3.1A7 7 0 0 0 19 11h-2z"/></svg>
      </button>
      <div class="input-pill">
        <label class="sr-only" for="prompt">Message</label>
        <textarea id="prompt" name="prompt" rows="1" placeholder="iMessage" required></textarea>
        <button type="submit" id="go" aria-label="Envoyer">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </form>
    <p id="status" class="status" hidden></p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
