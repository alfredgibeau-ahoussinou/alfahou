<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AlfAhou</title>
  <meta name="description" content="AlfAhou — IA multimédia d’Alfred Ahoussinou" />
  <meta name="theme-color" content="#0F1210" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true">
    <div class="veil"></div>
    <div class="grain"></div>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
  </div>

  <div class="shell" id="app">
    <header class="top">
      <a class="mark" href="/" aria-label="AlfAhou">AlfAhou</a>
      <nav class="top-actions">
        <button type="button" id="btn-voice-out" class="ghost" title="Lecture vocale">Voix</button>
        <button type="button" id="btn-reset" class="ghost">Effacer</button>
        <a class="ghost" href="https://github.com/alfredgibeau-ahoussinou/alfahou" target="_blank" rel="noopener">Code</a>
      </nav>
    </header>

    <main class="layout">
      <aside class="salon">
        <p class="byline">Alfred Ahoussinou</p>
        <h1 class="wordmark">AlfAhou</h1>
        <p class="pitch">Intelligence multimédia — texte, image, vidéo, PDF. Français &amp; anglais.</p>
        <div class="divider" aria-hidden="true"></div>
        <div class="rig">
          <label class="field">
            <span>Mode</span>
            <select id="mode">
              <option value="balanced">Équilibré</option>
              <option value="creative">Créatif</option>
              <option value="precise">Précis</option>
              <option value="teacher">Prof</option>
            </select>
          </label>
          <div class="tabs" role="group" aria-label="Modalité">
            <label class="tab"><input type="radio" name="modality" value="auto" form="composer" checked /><span>Auto</span></label>
            <label class="tab"><input type="radio" name="modality" value="text" form="composer" /><span>Texte</span></label>
            <label class="tab"><input type="radio" name="modality" value="image" form="composer" /><span>Image</span></label>
            <label class="tab"><input type="radio" name="modality" value="video" form="composer" /><span>Vidéo</span></label>
            <label class="tab"><input type="radio" name="modality" value="pdf" form="composer" /><span>PDF</span></label>
          </div>
        </div>
        <p class="live" id="device">connexion…</p>
      </aside>

      <section class="atelier">
        <div class="reel" id="thread" aria-live="polite">
          <article class="beat bot welcome">
            <p class="cue"><span>AlfAhou</span><time>maintenant</time></p>
            <div class="scene md">
              <p>Bonjour. Dis-moi ce que tu veux — une idée, un texte, une image, une vidéo, un PDF.</p>
            </div>
          </article>
        </div>

        <div id="suggestions" class="sparks" hidden></div>

        <form id="composer" class="dock" autocomplete="off">
          <button type="button" id="btn-mic" class="mic" title="Dicter" aria-label="Dicter">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <label class="sr-only" for="prompt">Message</label>
          <textarea id="prompt" name="prompt" rows="1" placeholder="Écrire…" required></textarea>
          <button type="submit" id="go" aria-label="Envoyer">
            <span>Envoyer</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>
        <p id="status" class="status" hidden></p>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
